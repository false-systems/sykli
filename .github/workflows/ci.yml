name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: core/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('core/mix.lock') }}

      - name: Install dependencies
        working-directory: core
        run: mix deps.get

      - name: Check formatting
        working-directory: core
        run: mix format --check-formatted

      - name: Run tests
        working-directory: core
        run: mix test

      - name: Security audit
        working-directory: core
        run: mix deps.audit
        continue-on-error: true

      - name: Build escript
        working-directory: core
        run: mix escript.build

  credo:
    name: Credo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: core/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('core/mix.lock') }}

      - name: Install dependencies
        working-directory: core
        run: mix deps.get

      - name: Run Credo
        working-directory: core
        run: mix credo

  blackbox:
    name: Black-box Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache core deps
        uses: actions/cache@v4
        with:
          path: core/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('core/mix.lock') }}

      - name: Install dependencies
        run: |
          python -m pip install jsonschema
          cd core && mix deps.get && mix escript.build
          cd ../sdk/elixir && mix deps.get
          cd ../typescript && npm ci

      - name: Run black-box suite
        run: test/blackbox/run.sh

  conformance:
    name: SDK Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install jsonschema
          cd sdk/elixir && mix deps.get
          cd ../typescript && npm ci

      - name: Check vocabulary generation
        run: python scripts/gen-vocab.py --check

      - name: Run conformance suite
        env:
          SYKLI_CONFORMANCE_PYTHON: python
        run: tests/conformance/run.sh

  oracle:
    name: Oracle Eval
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Install dependencies
        working-directory: core
        run: |
          mix deps.get
          mix escript.build

      - name: Run oracle eval
        run: eval/oracle/run.sh

  sdk-go:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Vet
        working-directory: sdk/go
        run: go vet ./...

      - name: Run tests
        working-directory: sdk/go
        run: go test ./...

  sdk-rust:
    name: Rust SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clippy
        working-directory: sdk/rust
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: sdk/rust
        run: cargo test

  sdk-elixir:
    name: Elixir SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: sdk/elixir/deps
          key: ${{ runner.os }}-mix-elixir-sdk-${{ hashFiles('sdk/elixir/mix.lock') }}

      - name: Install dependencies
        working-directory: sdk/elixir
        run: mix deps.get

      - name: Check formatting
        working-directory: sdk/elixir
        run: mix format --check-formatted

      - name: Run tests
        working-directory: sdk/elixir
        run: mix test

  sdk-typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Type check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: sdk/typescript
        run: npm test

  sdk-python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK
        working-directory: sdk/python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: sdk/python
        run: python -m pytest tests/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [core, sdk-go, sdk-rust, sdk-elixir, sdk-typescript, sdk-python]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build sykli
        working-directory: core
        run: |
          mix deps.get
          mix escript.build

      - name: Test Go example
        working-directory: core
        run: ./sykli ../examples/go-project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Test Elixir example
        working-directory: core
        run: ./sykli ../examples/elixir-project
        continue-on-error: true  # May fail without actual Elixir project files
